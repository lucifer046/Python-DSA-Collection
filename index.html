<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA HandBook</title>
  <link rel="icon" type="image/png" href="book/assets/logo.png">
  <meta name="description" content="A comprehensive manual for mastering Data Structures and Algorithms with Python.">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://lucifer046.github.io/python-dsa-handbook/">
  <meta property="og:site_name" content="DSA Handbook">
  <meta property="og:title" content="DSA Handbook — Algorithms & Data Structures in Python">
  <meta property="og:description" content="An immersive learning experience for mastering Data Structures and Algorithms with high-fidelity visuals and standardized Python implementations.">
  <meta property="og:image" content="https://lucifer046.github.io/python-dsa-handbook/book/assets/preview.png?v=1.1">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://lucifer046.github.io/python-dsa-handbook/">
  <meta name="twitter:title" content="DSA Handbook — Algorithms & Data Structures in Python">
  <meta name="twitter:description" content="An immersive learning experience for mastering Data Structures and Algorithms with high-fidelity visuals and standardized Python implementations.">
  <meta name="twitter:image" content="https://lucifer046.github.io/python-dsa-handbook/book/assets/preview.png?v=1.1">
  <meta name="twitter:image:alt" content="DSA Handbook Preview - Interactive algorithm visualizations and Python code">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Prism CSS (Dark theme for high contrast) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  
  <!-- Custom Aesthetics -->
  <link rel="stylesheet" href="book/style.css">

  <!-- MathJax for Beautiful Formulas -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        ignoreHtmlClass: 'code-pane', // Don't try to render LaTeX inside code blocks
        processHtmlClass: 'theory-pane'
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  
</head>
<body>

  <!-- Top Bar Layout (Focus Mode Activation) -->
  <header>
    <div class="header-left">
      <button class="menu-toggle" onclick="toggleMenu()" aria-label="Open Menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        <span>Topics</span>
      </button>
      <div class="brand">
        <img src="book/assets/logo.png" alt="Logo" class="brand-logo">
        <span class="brand-title">DSA HANDBOOK</span>
      </div>
    </div>
    <div class="header-right" style="display:flex; align-items:center; gap:0.75rem;">
      <button class="cmd-palette-trigger" onclick="openCmdPalette()" title="Search algorithms (Ctrl+K)">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
        <kbd class="cmd-kbd">Ctrl K</kbd>
      </button>
      <div class="view-switcher mobile-only">
        <button id="show-theory" class="view-btn active" onclick="switchView('theory')">Theory</button>
        <button id="show-code" class="view-btn" onclick="switchView('code')">Code</button>
      </div>
    </div>
  </header>

  <!-- Fullscreen Modal Navigation -->
  <div id="sidebar-overlay" class="sidebar-overlay">
    <div class="menu-container">
      <button class="close-menu" onclick="toggleMenu()">
        <i data-lucide="x" width="32" height="32"></i>
      </button>
      <div id="menu-content"></div>
    </div>
  </div>

  <!-- Command Palette -->
  <div id="cmd-palette-overlay" class="cmd-palette-overlay" onclick="handlePaletteOverlayClick(event)">
    <div class="cmd-palette-box">
      <div class="cmd-palette-input-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="cmd-palette-input" class="cmd-palette-input" type="text" placeholder="Search algorithms & topics..." autocomplete="off" spellcheck="false">
        <kbd class="cmd-kbd">ESC</kbd>
      </div>
      <div id="cmd-palette-results" class="cmd-palette-results"></div>
      <div class="cmd-palette-footer">
        <span class="cmd-palette-footer-hint"><kbd class="cmd-kbd">↑↓</kbd> Navigate</span>
        <span class="cmd-palette-footer-hint"><kbd class="cmd-kbd">Enter</kbd> Open</span>
        <span class="cmd-palette-footer-hint"><kbd class="cmd-kbd">Esc</kbd> Close</span>
        <span class="cmd-palette-footer-hint" style="margin-left:auto;"><kbd class="cmd-kbd">←→</kbd> Prev/Next</span>
      </div>
    </div>
  </div>

  <!-- Global Toast -->
  <div id="app-toast" class="app-toast"></div>

  <!-- Dual-Pane Immersive Layout -->
  <main id="book-layout" class="book-layout">
    <div class="theory-pane">
      <div id="theory-content-area"></div>
    </div>
    
    <div class="code-pane">
      <!-- Sync Status & Code Badge -->
      <div class="code-box-wrapper">
        <div class="code-header">
          <div class="code-badge">
            <div class="status-dot"></div>
            implementation.py
          </div>
          <div class="code-actions">
            <button class="code-btn" id="zoom-out-btn" aria-label="Zoom Out" title="Zoom Out">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <span id="zoom-level" style="font-family: 'Fira Code', monospace; font-size: 0.75rem; color: var(--text-muted); min-width: 40px; text-align: center;">100%</span>
            <button class="code-btn" id="zoom-in-btn" aria-label="Zoom In" title="Zoom In">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button class="code-btn" id="copy-code-btn" aria-label="Copy Code" title="Copy Code">
              <svg class="icon-copy" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              <svg class="icon-check" style="display:none; color: var(--accent-success);" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>
          </div>
        </div>
        <div class="code-box">
          <pre id="code-container" class="language-python"><code></code></pre>
        </div>
      </div>
    </div>
  </main>

  <!-- Global Footer -->
  <footer class="app-footer">
    <div class="footer-content">
      <span>Copyright © 2026 THE DSA HANDBOOK</span>
      <div class="footer-divider"></div>
      <span>Handbook by Divya Prakash</span>
    </div>
  </footer>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>

  <!-- Data Payload (Bypasses CORS) -->
  <script src="book/dsa_book_data.js"></script>

  <!-- Application Logic -->
  <script src="book/app.js"></script>
</body>
</html>
